<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" role="img" aria-label="Fluxo da árvore interativa">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0c1220"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="900" height="420" rx="16" fill="#06080f"/>
  <text x="450" y="32" text-anchor="middle" fill="#e8edf5" font-family="Segoe UI,sans-serif" font-size="18" font-weight="600">Jornada do Usuário na Árvore</text>

  <!-- boxes -->
  <rect x="40" y="70" width="160" height="70" rx="10" fill="url(#panel)" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="120" y="100" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="600">Galeria</text>
  <text x="120" y="120" text-anchor="middle" fill="#8899b0" font-size="11">7 projetos</text>

  <rect x="260" y="70" width="160" height="70" rx="10" fill="url(#panel)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="340" y="100" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="600">Árvore 3D</text>
  <text x="340" y="120" text-anchor="middle" fill="#8899b0" font-size="11">nós radiais</text>

  <rect x="480" y="70" width="160" height="70" rx="10" fill="url(#panel)" stroke="#34d399" stroke-width="1.5"/>
  <text x="560" y="100" text-anchor="middle" fill="#34d399" font-size="13" font-weight="600">Hover</text>
  <text x="560" y="120" text-anchor="middle" fill="#8899b0" font-size="11">tooltip</text>

  <rect x="700" y="70" width="160" height="70" rx="10" fill="url(#panel)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="780" y="100" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="600">Clique</text>
  <text x="780" y="120" text-anchor="middle" fill="#8899b0" font-size="11">modal código</text>

  <line x1="200" y1="105" x2="260" y2="105" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="420" y1="105" x2="480" y2="105" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="640" y1="105" x2="700" y2="105" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- modal -->
  <rect x="250" y="200" width="400" height="180" rx="14" fill="url(#panel)" stroke="#fbbf24" stroke-width="2"/>
  <text x="450" y="230" text-anchor="middle" fill="#fbbf24" font-size="15" font-weight="600">Modal de Código</text>
  <text x="270" y="258" fill="#8899b0" font-size="11">" O que faz</text>
  <text x="270" y="278" fill="#8899b0" font-size="11">" Código-fonte real</text>
  <text x="270" y="298" fill="#8899b0" font-size="11">" Como implementar</text>
  <rect x="270" y="320" width="360" height="40" rx="8" fill="#0a1628" stroke="#1e3a5f"/>
  <text x="290" y="345" fill="#a5f3fc" font-family="Consolas,monospace" font-size="10">def register(request): ...</text>

  <line x1="780" y1="140" x2="550" y2="200" stroke="#fbbf24" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="680" y="175" fill="#8899b0" font-size="10">abre</text>

  <!-- close loop -->
  <path d="M 450 380 Q 450 400 340 400 Q 120 400 120 140" fill="none" stroke="#34d399" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="200" y="395" fill="#34d399" font-size="11">Fechar ’ volta ŕ árvore</text>
</svg>
