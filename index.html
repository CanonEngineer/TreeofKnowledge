<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Árvore do Conhecimento — CanonEngineer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="cosmos" aria-hidden="true">
    <div class="stars"></div>
    <div class="nebula"></div>
  </div>

  <header class="site-header">
    <div class="brand">
      <span class="brand-icon">🌳</span>
      <div>
        <h1>Árvore do Conhecimento</h1>
        <p>Coração do GitHub — CanonEngineer</p>
      </div>
    </div>
    <nav class="header-nav">
      <a href="https://github.com/CanonEngineer" target="_blank" rel="noopener" class="btn-ghost">GitHub</a>
    </nav>
  </header>

  <main id="app">
    <!-- Galeria de Projetos -->
    <section id="gallery" class="gallery">
      <div class="gallery-intro">
        <h2>Selecione um Projeto</h2>
        <p>Cada árvore mapeia o código que criei — nós interativos com código e implementação.</p>
      </div>
      <div id="project-grid" class="project-grid"></div>
    </section>

    <!-- Visualização da Árvore -->
    <section id="tree-view" class="tree-view hidden">
      <div class="tree-toolbar">
        <button id="btn-back" class="btn-primary" type="button">
          <span>←</span> Voltar aos Projetos
        </button>
        <div class="tree-info">
          <span id="tree-project-name" class="tree-project-name"></span>
          <span id="tree-node-count" class="tree-node-count"></span>
        </div>
        <a id="tree-repo-link" href="#" target="_blank" rel="noopener" class="btn-ghost">Ver Repositório</a>
      </div>
      <div id="tree-scene" class="tree-scene">
        <div id="tree-stage" class="tree-stage">
          <svg id="tree-lines" class="tree-lines" aria-hidden="true"></svg>
          <div id="tree-nodes" class="tree-nodes"></div>
        </div>
      </div>
      <p class="tree-hint">Passe o mouse nos nós para detalhes · Clique para ver o código</p>
    </section>
  </main>

  <!-- Tooltip -->
  <div id="tooltip" class="tooltip hidden" role="tooltip">
    <strong id="tooltip-title"></strong>
    <p id="tooltip-desc"></p>
    <span id="tooltip-file" class="tooltip-file"></span>
  </div>

  <!-- Modal de Código -->
  <div id="modal-overlay" class="modal-overlay hidden" aria-hidden="true">
    <div id="modal" class="modal" role="dialog" aria-labelledby="modal-title">
      <header class="modal-header">
        <div>
          <h2 id="modal-title"></h2>
          <span id="modal-file" class="modal-file"></span>
        </div>
        <button id="modal-close" class="modal-close" type="button" aria-label="Fechar">✕</button>
      </header>
      <div class="modal-body">
        <section class="modal-section">
          <h3>O que faz</h3>
          <p id="modal-desc"></p>
        </section>
        <section class="modal-section">
          <h3>Código</h3>
          <pre><code id="modal-code"></code></pre>
        </section>
        <section class="modal-section">
          <h3>Como implementar</h3>
          <div id="modal-impl" class="modal-impl"></div>
        </section>
      </div>
      <footer class="modal-footer">
        <button id="modal-close-bottom" class="btn-primary" type="button">Fechar e Voltar à Árvore</button>
      </footer>
    </div>
  </div>

  <script src="js/data/projects.js"></script>
  <script src="js/tree-renderer.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
