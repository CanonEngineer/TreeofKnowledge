<!DOCTYPE html>

<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Árvore do Conhecimento — CanonEngineer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">

</head>

<body>

  <div class="cosmos" aria-hidden="true">

    <div class="stars"></div>

    <div class="nebula"></div>

  </div>



  <header class="site-header">

    <div class="brand">

      <img
        src="img/canon-profile.jpg"
        alt="Alessandro Canon — CanonEngineer"
        class="header-profile"
        width="48"
        height="48"
        loading="eager">

      <div>

        <h1>Árvore do Conhecimento</h1>

        <p>Coração do GitHub — CanonEngineer</p>

      </div>

    </div>

    <div class="header-search-wrap">

      <div class="search-box">

        <span class="search-icon">🔍</span>

        <input type="search" id="global-search" placeholder="Buscar código, função, arquivo..." autocomplete="off" aria-label="Buscar na árvore">

        <div id="search-results" class="search-results hidden"></div>

      </div>

    </div>

    <nav class="header-nav">

      <time id="header-datetime" class="header-datetime" datetime="" aria-live="polite"></time>

      <a href="https://github.com/CanonEngineer/TreeofKnowledge" class="btn-ghost">GitHub</a>

    </nav>

  </header>



  <div class="sagat-widget" aria-hidden="true" title="Sagat — Victory!">

    <svg class="sagat-fighter" viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">

      <ellipse cx="52" cy="154" rx="22" ry="3" fill="rgba(0,0,0,.45)"/>

      <g class="sagat-base">

        <rect x="38" y="108" width="10" height="28" fill="#1a1a1a"/>
        <rect x="36" y="134" width="14" height="6" fill="#0f0f0f"/>
        <rect x="37" y="136" width="12" height="3" fill="#262626"/>
        <rect x="34" y="96" width="28" height="14" fill="#1a1a1a"/>
        <rect x="36" y="98" width="24" height="4" fill="#262626"/>
        <rect x="30" y="58" width="36" height="40" fill="#b91c1c"/>
        <rect x="32" y="60" width="32" height="6" fill="#dc2626"/>
        <rect x="34" y="68" width="8" height="22" fill="#991b1b"/>
        <rect x="54" y="68" width="8" height="22" fill="#7f1d1d"/>
        <rect x="42" y="72" width="12" height="18" fill="#c68642"/>
        <rect x="44" y="76" width="8" height="3" fill="#a66d32"/>
        <rect x="44" y="82" width="8" height="3" fill="#a66d32"/>
        <rect x="28" y="54" width="14" height="12" fill="#c68642"/>
        <rect x="54" y="54" width="14" height="12" fill="#a66d32"/>
        <rect x="36" y="30" width="24" height="22" fill="#c68642"/>
        <rect x="38" y="28" width="20" height="6" fill="#a66d32"/>
        <rect x="50" y="36" width="4" height="3" fill="#1a1a1a"/>
        <rect x="38" y="34" width="14" height="5" fill="#f5f5f5"/>
        <rect x="40" y="35" width="10" height="3" fill="#e5e5e5"/>
        <rect x="48" y="33" width="8" height="2" fill="#8b5e2f"/>

        <g class="sagat-arm-l">
          <rect x="18" y="48" width="14" height="8" fill="#c68642"/>
          <rect x="10" y="42" width="12" height="8" fill="#a66d32"/>
          <rect x="6" y="40" width="8" height="8" fill="#c68642"/>
        </g>

        <g class="sagat-arm-r">
          <rect x="64" y="48" width="14" height="8" fill="#a66d32"/>
          <rect x="78" y="42" width="12" height="8" fill="#c68642"/>
          <rect x="90" y="40" width="8" height="8" fill="#a66d32"/>
        </g>

      </g>

      <g class="sagat-kick-leg">
        <rect x="54" y="88" width="12" height="26" fill="#1a1a1a"/>

      <g class="sagat-fx">
        <text x="72" y="24" class="sagat-perfect" font-family="'JetBrains Mono',monospace" font-size="11" font-weight="700" fill="#fbbf24">PERFECT</text>
        <rect class="spark" x="88" y="30" width="3" height="3" fill="#fde68a"/>
        <rect class="spark" x="96" y="26" width="2" height="2" fill="#f59e0b"/>
        <rect class="spark" x="80" y="18" width="2" height="2" fill="#fff"/>

    </svg>

  </div>



  <main id="app">

    <section id="gallery" class="gallery">

      <div class="gallery-intro">

        <h2>Selecione um Projeto</h2>

        <p>Cada árvore mapeia o código que criei — clique nos balões para abrir a página do código.</p>

      </div>

      <div id="project-grid" class="project-grid"></div>

    </section>



    <section id="tree-view" class="tree-view hidden">

      <div class="tree-toolbar">

        <button id="btn-back" class="btn-primary" type="button">

          <span>←</span> Voltar aos Projetos

        </button>

        <div class="tree-info">

          <span id="tree-project-name" class="tree-project-name"></span>

          <span id="tree-node-count" class="tree-node-count"></span>

        </div>

        <a id="tree-repo-link" href="#" target="_blank" rel="noopener" class="btn-ghost">Ver Repositório</a>

      </div>

      <div id="tree-scene" class="tree-scene">

        <div id="tree-stage" class="tree-stage">

          <svg id="tree-lines" class="tree-lines" aria-hidden="true"></svg>

          <div id="tree-nodes" class="tree-nodes"></div>

        </div>

      </div>

      <p class="tree-hint">Passe o mouse nos nós para detalhes · Clique no balão para abrir a página com código</p>

    </section>

  </main>



  <div id="tooltip" class="tooltip hidden" role="tooltip">

    <strong id="tooltip-title"></strong>

    <p id="tooltip-desc"></p>

    <span id="tooltip-file" class="tooltip-file"></span>

  </div>



  <script src="js/data/projects.js"></script>
  <script src="js/config.js"></script>
  <script src="js/header.js"></script>
  <script src="js/search.js"></script>
  <script src="js/tree-renderer.js"></script>
  <script src="js/app.js"></script>

</body>

</html>
