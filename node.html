<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nó — Árvore do Conhecimento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="cosmos" aria-hidden="true">
    <div class="stars"></div>
    <div class="nebula"></div>
  </div>

  <header class="site-header">
    <a href="index.html" class="brand brand-link">
      <img src="img/canon-profile.jpg" alt="Alessandro Canon" class="header-profile" width="48" height="48">
      <div>
        <h1>Árvore do Conhecimento</h1>
        <p id="node-breadcrumb">Carregando...</p>
      </div>
    </a>
    <div class="header-search-wrap">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="search" id="global-search" placeholder="Buscar código, função, arquivo..." autocomplete="off" aria-label="Buscar na árvore">
        <div id="search-results" class="search-results hidden"></div>
      </div>
    </div>
    <nav class="header-nav">
      <time id="header-datetime" class="header-datetime" aria-live="polite"></time>
      <a id="node-repo-link" href="#" target="_blank" rel="noopener" class="btn-ghost">Repositório</a>
    </nav>
  </header>

  <div class="sagat-widget" aria-hidden="true" title="Sagat — Victory!">
    <svg class="sagat-fighter" viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
      <ellipse cx="52" cy="154" rx="22" ry="3" fill="rgba(0,0,0,.45)"/>
      <g class="sagat-base">
        <rect x="38" y="108" width="10" height="28" fill="#1a1a1a"/>
        <rect x="36" y="134" width="14" height="6" fill="#0f0f0f"/>
        <rect x="34" y="96" width="28" height="14" fill="#1a1a1a"/>
        <rect x="30" y="58" width="36" height="40" fill="#b91c1c"/>
        <rect x="42" y="72" width="12" height="18" fill="#c68642"/>
        <rect x="36" y="30" width="24" height="22" fill="#c68642"/>
        <rect x="38" y="34" width="14" height="5" fill="#f5f5f5"/>
        <g class="sagat-arm-l"><rect x="18" y="48" width="14" height="8" fill="#c68642"/><rect x="10" y="42" width="12" height="8" fill="#a66d32"/><rect x="6" y="40" width="8" height="8" fill="#c68642"/></g>
        <g class="sagat-arm-r"><rect x="64" y="48" width="14" height="8" fill="#a66d32"/><rect x="78" y="42" width="12" height="8" fill="#c68642"/><rect x="90" y="40" width="8" height="8" fill="#a66d32"/></g>
      </g>
      <g class="sagat-kick-leg">
        <rect x="54" y="88" width="12" height="26" fill="#1a1a1a"/>
        <rect x="50" y="68" width="18" height="22" fill="#c68642"/>
        <rect x="54" y="56" width="10" height="10" fill="#c68642"/>
        <rect x="57" y="40" width="6" height="10" fill="#c68642"/>
        <rect x="58" y="32" width="5" height="10" fill="#a66d32"/>
      </g>
      <g class="sagat-fx">
        <text x="72" y="24" class="sagat-perfect" font-family="'JetBrains Mono',monospace" font-size="11" font-weight="700" fill="#fbbf24">PERFECT</text>
        <rect class="spark" x="88" y="30" width="3" height="3" fill="#fde68a"/>
      </g>
    </svg>
  </div>

  <main class="node-page">
    <div class="node-page-toolbar">
      <a id="btn-back-tree" href="index.html" class="btn-primary">← Voltar à Árvore</a>
      <span id="node-project-badge" class="node-project-badge"></span>
    </div>

    <article class="node-content-card">
      <header class="node-content-header">
        <span id="node-layer-badge" class="node-layer-badge"></span>
        <h2 id="node-title"></h2>
        <code id="node-file" class="node-file-path"></code>
      </header>

      <section class="node-section">
        <h3>O que faz</h3>
        <p id="node-desc"></p>
      </section>

      <section class="node-section">
        <h3>Código</h3>
        <pre class="code-block"><code id="node-code"></code></pre>
      </section>

      <section class="node-section">
        <h3>Como implementar</h3>
        <div id="node-impl" class="node-impl"></div>
      </section>
    </article>

    <nav class="node-siblings" id="node-siblings">
      <h3>Outros nós deste projeto</h3>
      <div id="sibling-links" class="sibling-links"></div>
    </nav>
  </main>

  <script src="js/data/projects.js"></script>
  <script src="js/config.js"></script>
  <script src="js/header.js"></script>
  <script src="js/search.js"></script>
  <script src="js/node-page.js"></script>
</body>
</html>
