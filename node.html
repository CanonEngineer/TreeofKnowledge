<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Node — Tree of Knowledge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="cosmos" aria-hidden="true">
    <div class="stars"></div>
    <div class="nebula"></div>
  </div>

  <header class="site-header">
    <a href="index.html" class="brand brand-link">
      <img src="img/canon-profile.jpg" alt="Alessandro Canon" class="header-profile" width="48" height="48">
      <div class="brand-text">
        <h1>Tree of Knowledge</h1>
        <p id="node-breadcrumb">Carregando...</p>
      </div>
    </a>
    <div class="header-cluster">
      <div class="header-search-wrap">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="search" id="global-search" placeholder="Buscar código, função, arquivo..." autocomplete="off" aria-label="Buscar na árvore">
          <div id="search-results" class="search-results hidden"></div>
        </div>
      </div>
      <div class="tech-dim-widget" aria-hidden="true" title="Canon Evolution">
        <div class="tech-dim-scene">
          <div class="tech-dim-ring tech-dim-ring-x"></div>
          <div class="tech-dim-ring tech-dim-ring-y"></div>
          <div class="tech-dim-ring tech-dim-ring-z"></div>
          <div class="tech-dim-cube">
            <div class="tech-cube-face front">&lt;/&gt;</div>
            <div class="tech-cube-face back">{ }</div>
            <div class="tech-cube-face right">01</div>
            <div class="tech-cube-face left">λ</div>
            <div class="tech-cube-face top">API</div>
            <div class="tech-cube-face bottom">Git</div>
          </div>
          <div class="tech-dim-core"></div>
          <span class="tech-orbit-dot"></span>
          <span class="tech-orbit-dot"></span>
          <span class="tech-orbit-dot"></span>
        </div>
        <span class="tech-dim-label">Canon Evolution</span>
      </div>
      <nav class="header-nav">
        <time id="header-datetime" class="header-datetime" aria-live="polite"></time>
        <a id="node-demo-link" href="#" target="_blank" rel="noopener" class="btn-ghost hidden">▶ Abrir Demo</a>
        <a id="node-repo-link" href="#" target="_blank" rel="noopener" class="btn-ghost">Repositório</a>
      </nav>
    </div>
  </header>

  <main class="node-page">
    <div class="node-page-toolbar">
      <a id="btn-back-tree" href="index.html" class="btn-primary">← Voltar à Árvore</a>
      <span id="node-project-badge" class="node-project-badge"></span>
    </div>

    <article class="node-content-card">
      <header class="node-content-header">
        <span id="node-layer-badge" class="node-layer-badge"></span>
        <h2 id="node-title"></h2>
        <code id="node-file" class="node-file-path"></code>
      </header>

      <section class="node-section">
        <h3>O que faz</h3>
        <p id="node-desc"></p>
      </section>

      <section class="node-section">
        <h3>Código</h3>
        <p id="code-cimed-legend" class="code-cimed-legend" hidden>
          Trechos em <span class="code-cimed-swatch">vermelho</span> são customizações CIMED
          (alterações / arquivos novos sobre o Veyon original) — use para estudo.
        </p>
        <pre class="code-block"><code id="node-code"></code></pre>
      </section>

      <section class="node-section">
        <h3>Como implementar</h3>
        <div id="node-impl" class="node-impl"></div>
      </section>
    </article>

    <nav class="node-siblings" id="node-siblings">
      <h3>Outros nós deste projeto</h3>
      <div id="sibling-links" class="sibling-links"></div>
    </nav>
  </main>

  <script src="js/data/projects.js?v=654-dz133"></script>
  <script src="js/config.js"></script>
  <script src="js/header.js"></script>
  <script src="js/search.js"></script>
  <script src="js/cimed-code-highlight.js"></script>
  <script src="js/node-page.js"></script>
</body>
</html>
