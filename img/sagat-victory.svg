<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" shape-rendering="crispEdges">
  <defs>
    <style>
      .px { shape-rendering: crispEdges; }
    </style>
  </defs>
  <!-- sombra -->
  <ellipse cx="52" cy="154" rx="22" ry="3" fill="rgba(0,0,0,.45)"/>
  <!-- grupo base: perna apoio + torso + cabeça + braços -->
  <g id="sagat-base">
    <!-- perna apoio esquerda -->
    <rect class="px" x="38" y="108" width="10" height="28" fill="#1a1a1a"/>
    <rect class="px" x="36" y="134" width="14" height="6" fill="#0f0f0f"/>
    <rect class="px" x="37" y="136" width="12" height="3" fill="#262626"/>
    <!-- shorts -->
    <rect class="px" x="34" y="96" width="28" height="14" fill="#1a1a1a"/>
    <rect class="px" x="36" y="98" width="24" height="4" fill="#262626"/>
    <!-- torso musculoso  gi vermelho aberto -->
    <rect class="px" x="30" y="58" width="36" height="40" fill="#b91c1c"/>
    <rect class="px" x="32" y="60" width="32" height="6" fill="#dc2626"/>
    <rect class="px" x="34" y="68" width="8" height="22" fill="#991b1b"/>
    <rect class="px" x="54" y="68" width="8" height="22" fill="#7f1d1d"/>
    <!-- pele abdômen -->
    <rect class="px" x="42" y="72" width="12" height="18" fill="#c68642"/>
    <rect class="px" x="44" y="76" width="8" height="3" fill="#a66d32"/>
    <rect class="px" x="44" y="82" width="8" height="3" fill="#a66d32"/>
    <!-- peito / ombros -->
    <rect class="px" x="28" y="54" width="14" height="12" fill="#c68642"/>
    <rect class="px" x="54" y="54" width="14" height="12" fill="#a66d32"/>
    <!-- cabeça  perfil Sagat -->
    <rect class="px" x="36" y="30" width="24" height="22" fill="#c68642"/>
    <rect class="px" x="38" y="28" width="20" height="6" fill="#a66d32"/>
    <!-- olho + tapa-olho branco -->
    <rect class="px" x="50" y="36" width="4" height="3" fill="#1a1a1a"/>
    <rect class="px" x="38" y="34" width="14" height="5" fill="#f5f5f5"/>
    <rect class="px" x="40" y="35" width="10" height="3" fill="#e5e5e5"/>
    <!-- cicatriz / sobrancelha -->
    <rect class="px" x="48" y="33" width="8" height="2" fill="#8b5e2f"/>
    <!-- braço esquerdo vitória -->
    <g class="sagat-arm-l">
      <rect class="px" x="18" y="48" width="14" height="8" fill="#c68642"/>
      <rect class="px" x="10" y="42" width="12" height="8" fill="#a66d32"/>
      <rect class="px" x="6" y="40" width="8" height="8" fill="#c68642"/>
    </g>
    <!-- braço direito vitória -->
    <g class="sagat-arm-r">
      <rect class="px" x="64" y="48" width="14" height="8" fill="#a66d32"/>
      <rect class="px" x="78" y="42" width="12" height="8" fill="#c68642"/>
      <rect class="px" x="90" y="40" width="8" height="8" fill="#a66d32"/>
    </g>
  </g>
  <!-- perna vitória  chute vertical estilo SF2 -->
  <g class="sagat-kick-leg">
    <rect class="px" x="54" y="88" width="12" height="26" fill="#1a1a1a"/>
    <rect class="px" x="52" y="112" width="16" height="8" fill="#0f0f0f"/>
    <rect class="px" x="50" y="68" width="18" height="22" fill="#c68642"/>
    <rect class="px" x="52" y="64" width="14" height="8" fill="#a66d32"/>
    <rect class="px" x="54" y="56" width="10" height="10" fill="#c68642"/>
    <rect class="px" x="56" y="48" width="8" height="10" fill="#a66d32"/>
    <rect class="px" x="57" y="40" width="6" height="10" fill="#c68642"/>
  </g>
  <!-- faíscas estilo arcade -->
  <g class="sagat-fx" opacity="0">
    <text x="82" y="28" fill="#fbbf24" font-family="monospace" font-size="14" font-weight="bold">PERFECT</text>
    <rect x="86" y="34" width="3" height="3" fill="#fde68a"/>
    <rect x="94" y="30" width="2" height="2" fill="#f59e0b"/>
    <rect x="78" y="22" width="2" height="2" fill="#fff"/>
  </g>
</svg>
